<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Profile - QuickPick</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .profile-container {
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .profile-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: #ff3e6c;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-submit:hover {
      background-color: #e63560;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="nav-brand">QuickPick</div>
    </div>
  </nav>

  <div class="container">
    <div class="profile-container">
      <h2>Complete Your Profile</h2>
      <p style="text-align: center; color: #666; margin-bottom: 20px;">Please provide some additional details to enhance your experience.</p>
      
      <form id="profile-form">
        <div class="form-group">
          <label for="profile-name">Full Name</label>
          <input type="text" id="profile-name" placeholder="Enter your full name" required>
        </div>
        
        <div class="form-group">
          <label for="profile-photo">Profile Photo URL</label>
          <input type="url" id="profile-photo" placeholder="https://example.com/photo.jpg">
        </div>
        
        <div class="form-group">
          <label for="profile-college">College / University</label>
          <input type="text" id="profile-college" placeholder="Enter your college name">
        </div>
        
        <div class="form-group">
          <label for="profile-course">Course / Degree</label>
          <input type="text" id="profile-course" placeholder="e.g. B.Tech, MBA">
        </div>
        
        <div class="form-group">
          <label for="profile-location">Location (City)</label>
          <input type="text" id="profile-location" placeholder="e.g. New Delhi">
        </div>
        
        <div class="form-group">
          <label for="profile-pincode">Pincode</label>
          <input type="text" id="profile-pincode" placeholder="6-digit pincode" maxlength="6">
        </div>
        
        <button type="submit" class="btn-submit">Save Profile</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check if authenticated
    if (!isAuthenticated()) {
      window.location.href = 'index.html';
    }

    const user = getCurrentUser();
    document.getElementById('profile-name').value = user.name || '';

    // Handle form submission
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const profileData = {
        name: document.getElementById('profile-name').value,
        photo: document.getElementById('profile-photo').value,
        college: document.getElementById('profile-college').value,
        course: document.getElementById('profile-course').value,
        location: document.getElementById('profile-location').value,
        pincode: document.getElementById('profile-pincode').value
      };

      try {
        const response = await userAPI.updateUserProfile(profileData);
        alert('Profile updated successfully!');
        
        // Update local storage user data
        const updatedUser = { ...user, ...profileData, isProfileComplete: true };
        localStorage.setItem('currentUser', JSON.stringify(updatedUser));
        
        // Redirect to homepage
        window.location.href = 'index.html';
      } catch (error) {
        alert('Error updating profile: ' + error.message);
      }
    });
  </script>
</body>
</html>
